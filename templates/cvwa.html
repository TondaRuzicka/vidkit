<main id="main">
  <section class="hero hero--tool">
    <div class="container container--prose">
      <p class="eyebrow">{{hero.eyebrow}}</p>
      <h1>{{hero.title}}</h1>
      <p class="lead">{{hero.lead}}</p>
    </div>
  </section>

  <div class="container container--prose">
    <div id="compressor" data-page="cvwa" data-target-mb="16" data-locked="true">
      <noscript>
        <p>{{widget.noscript}}</p>
      </noscript>
    </div>
  </div>

  <section class="section">
    <div class="container container--prose prose">
      <h2>{{prose.h2}}</h2>
      <p>{{prose.p1}}</p>
      <p>{{prose.p2}}</p>
      <p>{{prose.p3}}</p>
    </div>
  </section>

  <section class="section section--tint">
    <div class="container">
      <div class="section-head"><h2>{{faq.heading}}</h2></div>
      <div class="faq">
        <details class="faq-item">
          <summary>{{faq.q1}}<span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span></summary>
          <div>{{faq.a1}}</div>
        </details>
        <details class="faq-item">
          <summary>{{faq.q2}}<span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span></summary>
          <div>{{faq.a2}}</div>
        </details>
        <details class="faq-item">
          <summary>{{faq.q3}}<span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span></summary>
          <div>{{faq.a3}}</div>
        </details>
        <details class="faq-item">
          <summary>{{faq.q4}}<span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span></summary>
          <div>{{faq.a4}}</div>
        </details>
        <details class="faq-item">
          <summary>{{faq.q5}}<span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span></summary>
          <div>{{faq.a5}}</div>
        </details>
      </div>
    </div>
  </section>
</main>
